apiVersion: v1
kind: Namespace
metadata:
  name: ecosort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecosort-backend
  namespace: ecosort
  labels:
    app: ecosort-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecosort-backend
  template:
    metadata:
      labels:
        app: ecosort-backend
    spec:
      containers:
        - name: ecosort-backend
          image: ecosort-backend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ecosort-backend
  namespace: ecosort
spec:
  selector:
    app: ecosort-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
  type: ClusterIP

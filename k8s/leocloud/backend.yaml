apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecosort-backend
  labels:
    app: ecosort-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecosort-backend
  template:
    metadata:
      labels:
        app: ecosort-backend
    spec:
      containers:
        - name: ecosort-backend
          # Replace with your pushed image, e.g. ghcr.io/<user>/ecosort-backend:v1
          image: docker.io/library/replace-backend-image:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: ECOSORT_MODEL_PATH
              value: /app/model/ecosort.keras
            - name: ECOSORT_LABELS_PATH
              value: /app/model/labels.json
            - name: ECOSORT_ALLOWED_ORIGINS
              value: https://if200166.cloud.htl-leonding.ac.at
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ecosort-backend
spec:
  selector:
    app: ecosort-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
  type: ClusterIP

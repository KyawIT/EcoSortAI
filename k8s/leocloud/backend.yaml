apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecosort-backend
  labels:
    app: ecosort-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecosort-backend
  template:
    metadata:
      labels:
        app: ecosort-backend
    spec:
      containers:
        - name: ecosort-backend
          # Replace with your pushed image, e.g. ghcr.io/<user>/ecosort-backend:v1
          image: docker.io/library/replace-backend-image:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: ECOSORT_MODEL_PATH
              value: /app/model/ecosort.onnx
            - name: ECOSORT_LABELS_PATH
              value: /app/model/labels.json
            - name: ECOSORT_ALLOWED_ORIGINS
              value: https://if200166.cloud.htl-leonding.ac.at
          # Startup probe gates readiness/liveness until TF + model finish loading.
          # TF cold-start on constrained CPU can take 3-5 min.
          # 60 × 10s = 600s max before Kubernetes gives up.
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0   # startup probe already handled the wait
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 4
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ecosort-backend
spec:
  selector:
    app: ecosort-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
  type: ClusterIP

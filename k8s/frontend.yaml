apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecosort-frontend
  namespace: ecosort
  labels:
    app: ecosort-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecosort-frontend
  template:
    metadata:
      labels:
        app: ecosort-frontend
    spec:
      containers:
        - name: ecosort-frontend
          image: ecosort-frontend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: ECOSORT_API_BASE_URL
              value: http://ecosort-backend.ecosort.svc.cluster.local:8000
            - name: NEXT_PUBLIC_APP_NAME
              value: EcoSort AI
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ecosort-frontend
  namespace: ecosort
spec:
  selector:
    app: ecosort-frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
  type: ClusterIP

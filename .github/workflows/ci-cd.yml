name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One deploy at a time — queues, doesn't cancel in-flight
concurrency:
  group: deploy-leocloud
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/kyawit/ecosortai-backend
  FRONTEND_IMAGE: ghcr.io/kyawit/ecosortai-frontend

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1 — Build & push images to GHCR
  # ────────────────────────────────────────────────────────────────
  build_push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend ────────────────────────────────────────────────
      # Layer cache: GHA cache (fast, free) + registry fallback
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: |
            type=gha,scope=backend
            type=registry,ref=${{ env.BACKEND_IMAGE }}:latest
          cache-to: type=gha,scope=backend,mode=max

      # ── Frontend ───────────────────────────────────────────────
      # Pass build arg so Next.js bakes the app name at build time
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_APP_NAME=EcoSort AI
          cache-from: |
            type=gha,scope=frontend
            type=registry,ref=${{ env.FRONTEND_IMAGE }}:latest
          cache-to: type=gha,scope=frontend,mode=max

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — Deploy to LeoCloud (main only)
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to LeoCloud
    needs: build_push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://if200166.cloud.htl-leonding.ac.at

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kustomize
        run: |
          curl -sSfL \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin
          kustomize version

      # Decode kubeconfig — secret must NOT have trailing %
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.LEOCLOUD_KUBECONFIG_B64 }}" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config current-context

      - name: Set namespace
        run: |
          kubectl config set-context --current \
            --namespace=${{ secrets.LEOCLOUD_NAMESPACE }}

      # Patches kustomization.yaml in the runner workspace (not committed)
      - name: Inject SHA image tags
        working-directory: k8s/leocloud
        run: |
          kustomize edit set image \
            docker.io/library/replace-backend-image:latest=${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          kustomize edit set image \
            docker.io/library/replace-frontend-image:latest=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Apply manifests
        run: kubectl apply -k k8s/leocloud

      - name: Wait — backend rollout
        env:
          NS: ${{ secrets.LEOCLOUD_NAMESPACE }}
        run: |
          echo "Waiting for ecosort-backend (max 10 min)..."
          for i in $(seq 1 60); do
            DESIRED=$(kubectl get deploy ecosort-backend -n $NS \
              -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "1")
            UPDATED=$(kubectl get deploy ecosort-backend -n $NS \
              -o jsonpath='{.status.updatedReplicas}' 2>/dev/null || echo "0")
            READY=$(kubectl get deploy ecosort-backend -n $NS \
              -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")

            echo "  [${i}/60] desired=${DESIRED} updated=${UPDATED} ready=${READY}"

            # Success: all replicas updated AND ready
            if [ "${READY}" = "${DESIRED}" ] && [ "${UPDATED}" = "${DESIRED}" ]; then
              echo "Backend is ready."
              exit 0
            fi

            # Crash detection — skip terminating (old) pods by checking deletionTimestamp
            CRASH_POD=$(kubectl get pods -n $NS -l app=ecosort-backend \
              -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.metadata.deletionTimestamp}{"\t"}{.status.containerStatuses[0].state.waiting.reason}{"\n"}{end}' \
              2>/dev/null \
              | awk -F'\t' '$2=="" && ($3=="CrashLoopBackOff" || $3=="Error") {print $1}' \
              | head -1)

            if [ -n "$CRASH_POD" ]; then
              echo "Pod ${CRASH_POD} crashed — dumping logs:"
              kubectl logs -n $NS "$CRASH_POD" --tail=80 || true
              kubectl logs -n $NS "$CRASH_POD" --previous --tail=80 || true
              echo "--- events ---"
              kubectl describe pod -n $NS "$CRASH_POD" | grep -A5 "Events:" || true
              exit 1
            fi

            # Image pull failure
            PULL_FAIL=$(kubectl get pods -n $NS -l app=ecosort-backend \
              -o jsonpath='{range .items[*]}{.metadata.deletionTimestamp}{"\t"}{.status.containerStatuses[0].state.waiting.reason}{"\n"}{end}' \
              2>/dev/null \
              | awk -F'\t' '$1=="" && ($2=="ErrImagePull" || $2=="ImagePullBackOff") {print $2}' \
              | head -1)

            if [ -n "$PULL_FAIL" ]; then
              echo "Image pull failed (${PULL_FAIL}) — check GHCR package visibility."
              kubectl describe pods -n $NS -l app=ecosort-backend | tail -20 || true
              exit 1
            fi

            sleep 10
          done
          echo "Timed out after 10 min."
          kubectl describe pods -n $NS -l app=ecosort-backend | tail -30 || true
          exit 1

      - name: Wait — frontend rollout
        env:
          NS: ${{ secrets.LEOCLOUD_NAMESPACE }}
        run: |
          echo "Waiting for ecosort-frontend (max 3 min)..."
          for i in $(seq 1 18); do
            DESIRED=$(kubectl get deploy ecosort-frontend -n $NS \
              -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "1")
            UPDATED=$(kubectl get deploy ecosort-frontend -n $NS \
              -o jsonpath='{.status.updatedReplicas}' 2>/dev/null || echo "0")
            READY=$(kubectl get deploy ecosort-frontend -n $NS \
              -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")

            echo "  [${i}/18] desired=${DESIRED} updated=${UPDATED} ready=${READY}"

            if [ "${READY}" = "${DESIRED}" ] && [ "${UPDATED}" = "${DESIRED}" ]; then
              echo "Frontend is ready."
              exit 0
            fi

            CRASH_POD=$(kubectl get pods -n $NS -l app=ecosort-frontend \
              -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.metadata.deletionTimestamp}{"\t"}{.status.containerStatuses[0].state.waiting.reason}{"\n"}{end}' \
              2>/dev/null \
              | awk -F'\t' '$2=="" && ($3=="CrashLoopBackOff" || $3=="Error") {print $1}' \
              | head -1)

            if [ -n "$CRASH_POD" ]; then
              echo "Frontend pod ${CRASH_POD} crashed — dumping logs:"
              kubectl logs -n $NS "$CRASH_POD" --tail=60 || true
              exit 1
            fi

            sleep 10
          done
          echo "Timed out after 3 min."
          exit 1

      # Smoke tests run inside the cluster — no ingress needed
      - name: Smoke test — backend /health
        run: |
          kubectl run smoke-backend \
            --image=curlimages/curl:8.8.0 \
            --restart=Never \
            --rm \
            --attach \
            --namespace=${{ secrets.LEOCLOUD_NAMESPACE }} \
            -- curl -sf --max-time 10 http://ecosort-backend:8000/health

      - name: Smoke test — frontend
        run: |
          kubectl run smoke-frontend \
            --image=curlimages/curl:8.8.0 \
            --restart=Never \
            --rm \
            --attach \
            --namespace=${{ secrets.LEOCLOUD_NAMESPACE }} \
            -- curl -sf --max-time 10 http://ecosort-frontend:3000/

      # Runs only if any previous step failed
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deploy failed — rolling back both deployments"
          kubectl rollout undo deployment/ecosort-backend \
            --namespace=${{ secrets.LEOCLOUD_NAMESPACE }} || true
          kubectl rollout undo deployment/ecosort-frontend \
            --namespace=${{ secrets.LEOCLOUD_NAMESPACE }} || true

name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One deploy at a time — queues, doesn't cancel in-flight
concurrency:
  group: deploy-leocloud
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/kyawit/ecosortai-backend
  FRONTEND_IMAGE: ghcr.io/kyawit/ecosortai-frontend

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1 — Build & push images to GHCR
  # ────────────────────────────────────────────────────────────────
  build_push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend ────────────────────────────────────────────────
      # Layer cache: GHA cache (fast, free) + registry fallback
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: |
            type=gha,scope=backend
            type=registry,ref=${{ env.BACKEND_IMAGE }}:latest
          cache-to: type=gha,scope=backend,mode=max

      # ── Frontend ───────────────────────────────────────────────
      # Pass build arg so Next.js bakes the app name at build time
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_APP_NAME=EcoSort AI
          cache-from: |
            type=gha,scope=frontend
            type=registry,ref=${{ env.FRONTEND_IMAGE }}:latest
          cache-to: type=gha,scope=frontend,mode=max

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — Deploy to LeoCloud (main only)
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to LeoCloud
    needs: build_push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://if200166.cloud.htl-leonding.ac.at

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kustomize
        run: |
          curl -sSfL \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin
          kustomize version

      # Decode kubeconfig — secret must NOT have trailing %
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.LEOCLOUD_KUBECONFIG_B64 }}" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config current-context

      - name: Set namespace
        run: |
          kubectl config set-context --current \
            --namespace=${{ secrets.LEOCLOUD_NAMESPACE }}

      # Patches kustomization.yaml in the runner workspace (not committed)
      - name: Inject SHA image tags
        working-directory: k8s/leocloud
        run: |
          kustomize edit set image \
            docker.io/library/replace-backend-image:latest=${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          kustomize edit set image \
            docker.io/library/replace-frontend-image:latest=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Apply manifests
        run: kubectl apply -k k8s/leocloud

      - name: Wait — backend rollout
        run: |
          echo "Waiting for ecosort-backend pods (max 10 min, fails fast on CrashLoopBackOff)..."
          for i in $(seq 1 60); do
            REASON=$(kubectl get pods -n ${{ secrets.LEOCLOUD_NAMESPACE }} \
              -l app=ecosort-backend \
              -o jsonpath='{.items[0].status.containerStatuses[0].state.waiting.reason}' 2>/dev/null || true)

            READY=$(kubectl get pods -n ${{ secrets.LEOCLOUD_NAMESPACE }} \
              -l app=ecosort-backend \
              -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null || true)

            echo "  [${i}/60] ready=${READY} waitReason=${REASON}"

            if [ "$READY" = "true" ]; then
              echo "Backend is ready."
              exit 0
            fi

            if [ "$REASON" = "CrashLoopBackOff" ] || [ "$REASON" = "Error" ]; then
              echo "Pod crashed (${REASON}) — dumping logs:"
              kubectl logs -n ${{ secrets.LEOCLOUD_NAMESPACE }} \
                -l app=ecosort-backend --tail=60 || true
              kubectl logs -n ${{ secrets.LEOCLOUD_NAMESPACE }} \
                -l app=ecosort-backend --previous --tail=60 || true
              echo "--- describe ---"
              kubectl describe pods -n ${{ secrets.LEOCLOUD_NAMESPACE }} \
                -l app=ecosort-backend | tail -30 || true
              exit 1
            fi

            if [ "$REASON" = "ErrImagePull" ] || [ "$REASON" = "ImagePullBackOff" ]; then
              echo "Image pull failed — check GHCR visibility or image tag."
              kubectl describe pods -n ${{ secrets.LEOCLOUD_NAMESPACE }} \
                -l app=ecosort-backend | tail -20 || true
              exit 1
            fi

            sleep 10
          done
          echo "Timed out after 10 min waiting for backend."
          kubectl describe pods -n ${{ secrets.LEOCLOUD_NAMESPACE }} \
            -l app=ecosort-backend | tail -30 || true
          exit 1

      - name: Wait — frontend rollout
        run: |
          echo "Waiting for ecosort-frontend pods (max 3 min)..."
          for i in $(seq 1 18); do
            REASON=$(kubectl get pods -n ${{ secrets.LEOCLOUD_NAMESPACE }} \
              -l app=ecosort-frontend \
              -o jsonpath='{.items[0].status.containerStatuses[0].state.waiting.reason}' 2>/dev/null || true)

            READY=$(kubectl get pods -n ${{ secrets.LEOCLOUD_NAMESPACE }} \
              -l app=ecosort-frontend \
              -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null || true)

            echo "  [${i}/18] ready=${READY} waitReason=${REASON}"

            if [ "$READY" = "true" ]; then
              echo "Frontend is ready."
              exit 0
            fi

            if [ "$REASON" = "CrashLoopBackOff" ] || [ "$REASON" = "Error" ]; then
              echo "Frontend pod crashed — dumping logs:"
              kubectl logs -n ${{ secrets.LEOCLOUD_NAMESPACE }} \
                -l app=ecosort-frontend --tail=40 || true
              exit 1
            fi

            sleep 10
          done
          echo "Timed out after 3 min waiting for frontend."
          exit 1

      # Smoke tests run inside the cluster — no ingress needed
      - name: Smoke test — backend /health
        run: |
          kubectl run smoke-backend \
            --image=curlimages/curl:8.8.0 \
            --restart=Never \
            --rm \
            --attach \
            --namespace=${{ secrets.LEOCLOUD_NAMESPACE }} \
            -- curl -sf --max-time 10 http://ecosort-backend:8000/health

      - name: Smoke test — frontend
        run: |
          kubectl run smoke-frontend \
            --image=curlimages/curl:8.8.0 \
            --restart=Never \
            --rm \
            --attach \
            --namespace=${{ secrets.LEOCLOUD_NAMESPACE }} \
            -- curl -sf --max-time 10 http://ecosort-frontend:3000/

      # Runs only if any previous step failed
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deploy failed — rolling back both deployments"
          kubectl rollout undo deployment/ecosort-backend \
            --namespace=${{ secrets.LEOCLOUD_NAMESPACE }} || true
          kubectl rollout undo deployment/ecosort-frontend \
            --namespace=${{ secrets.LEOCLOUD_NAMESPACE }} || true
